load_module modules/ngx_http_js_module.so;

# Expose to the njs runtime (process.env) so ingest.njs can honor it.
env INGEST_BEARER_HASH;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
    '"path":"$uri","status":$status,"req_bytes":$request_length,"resp_bytes":$bytes_sent,'
    '"req_time":$request_time,"upstream_time":"$upstream_response_time"}';
  access_log /var/log/nginx/access.log json_combined;

  js_import ingest from /etc/nginx/ingest.njs;

  # njs ngx.fetch() does its own DNS resolution (it does not use nginx
  # upstreams), so it needs a resolver to look up the `api` service name.
  # 127.0.0.11 is Docker's embedded DNS.
  resolver 127.0.0.11 ipv6=off valid=30s;

  upstream api_upstream {
    server api:3000;
    keepalive 16;
  }

  upstream dashboard_upstream {
    server dashboard:80;
    keepalive 16;
  }

  # Redirect HTTP → HTTPS unless TLS_DISABLED.
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Health check endpoint (always plain HTTP). Proxies to the API readiness
    # probe so an external LB/uptime check reflects real API+DB health, not just
    # that nginx itself is up.
    location = /healthz {
      access_log off;
      proxy_pass http://api_upstream/api/v1/healthz;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # In TLS-disabled mode, serve directly. Otherwise redirect.
    location / {
      if ($host = "") { return 444; }
      # Static redirect: replace at deploy time via env if needed.
      return 308 https://$host$request_uri;
    }
  }

  server {
    # Listen on 443 always; if no certs, the proxy container will fail to start
    # and the operator should set TLS_DISABLED + use external TLS termination.
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 4m;

    # Ingest endpoint — optionally hash bearer device tokens before forwarding.
    location = /api/v1/ingest {
      js_content ingest.handle;
    }

    # CLI install one-liner. The API serves this at the top level (/install.sh),
    # not under /api/, so it needs its own proxy block or it would fall through
    # to the dashboard SPA and return index.html.
    location = /install.sh {
      proxy_pass http://api_upstream/install.sh;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Overwrite (not append) so a client-supplied X-Forwarded-For cannot forge
      # the IP that rate limiting and audit logging key on.
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
      proxy_pass_header Set-Cookie;
      proxy_read_timeout 60s;
    }

    # Dashboard SPA
    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
