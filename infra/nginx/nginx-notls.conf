load_module modules/ngx_http_js_module.so;

# Expose to the njs runtime (process.env) so ingest.njs can honor it.
env INGEST_BEARER_HASH;

events {
  worker_connections 1024;
}

# Plain-HTTP config, selected when TLS_DISABLED=true (see 40-select-config.sh).
# Use this when TLS is terminated upstream (corporate ALB, Cloudflare, etc.) and
# this proxy is reached over plain HTTP on port 80. No certs are required and no
# HTTPS redirect is performed.
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
    '"path":"$uri","status":$status,"req_bytes":$request_length,"resp_bytes":$bytes_sent,'
    '"req_time":$request_time,"upstream_time":"$upstream_response_time"}';
  access_log /var/log/nginx/access.log json_combined;

  js_import /etc/nginx/ingest.njs;

  upstream api_upstream {
    server api:3000;
    keepalive 16;
  }

  upstream dashboard_upstream {
    server dashboard:80;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 4m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location = /healthz {
      access_log off;
      proxy_pass http://api_upstream/api/v1/healthz;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /api/v1/ingest {
      js_content ingest.handle;
    }

    location = /install.sh {
      proxy_pass http://api_upstream/install.sh;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      # Trust the upstream TLS terminator's proto; default to https since TLS is
      # terminated before us in this mode.
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
      proxy_pass_header Set-Cookie;
      proxy_read_timeout 60s;
    }

    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
  }
}
