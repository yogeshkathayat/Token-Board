# Override for local development — no TLS, build from source, mount source for hot reload.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  db:
    ports: ['5432:5432']

  api:
    image: ''
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ../apps/api/src:/app/apps/api/src:ro
      - ../packages/shared/src:/app/packages/shared/src:ro
    ports: ['3000:3000']
    command: npm --workspace apps/api run dev

  dashboard:
    image: ''
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
      target: dev
    ports: ['5173:5173']
    volumes:
      - ../apps/dashboard/src:/app/apps/dashboard/src:ro
    command: npm --workspace apps/dashboard run dev -- --host 0.0.0.0

  proxy:
    environment:
      TLS_DISABLED: 'true'
