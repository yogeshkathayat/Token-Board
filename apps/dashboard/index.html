<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Track AI coding tool token usage across your team." />
    <title>Token Board</title>
    <script>
      // Apply the saved theme synchronously to avoid a flash of the wrong palette.
      (function () {
        try {
          var v = localStorage.getItem('tokenboard.theme');
          var dark =
            v === 'dark' ||
            ((!v || v === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
