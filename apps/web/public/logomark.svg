<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Three ascending bars representing tokens on a leaderboard -->
  <!-- Bar 1: Shortest (3rd place) -->
  <rect x="12" y="36" width="10" height="16" rx="5" fill="#06b6d4"/>
  <!-- Bar 2: Medium (2nd place) -->
  <rect x="27" y="26" width="10" height="26" rx="5" fill="#0891b2"/>
  <!-- Bar 3: Tallest (1st place) -->
  <rect x="42" y="16" width="10" height="36" rx="5" fill="#0e7490"/>
</svg>
